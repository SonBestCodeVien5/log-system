# =============================================================
# Logstash Pipeline — Log System
# Input: Filebeat → Filter: JSON parse + Grok enrich → Output: ES
# =============================================================

input {
  beats {
    port => 5044
  }
}

filter {

  # -----------------------------------------------------------
  # BƯỚC 1 — Parse JSON Lines
  # Demo services ghi log dạng JSON, parse thành fields
  # -----------------------------------------------------------
  json {
    source  => "message"
    target  => "log"
    remove_field => ["message"]
  }

  # Nếu JSON parse thất bại → tag và bỏ qua các bước sau
  if "_jsonparsefailure" in [tags] {
    mutate {
      add_field => { "parse_error" => "invalid JSON, raw message kept" }
    }
  } else {

    # ---------------------------------------------------------
    # BƯỚC 2 — Promote fields từ log object lên root
    # log.level → level, log.service → service, v.v.
    # ---------------------------------------------------------
    mutate {
      copy => {
        "[log][timestamp]" => "log_timestamp"
      }
    }

    mutate {
      rename => {
        "[log][level]"    => "level"
        "[log][service]"  => "service"
        "[log][message]"  => "log_message"
        "[log][metadata]" => "metadata"
      }
      remove_field => ["log"]
    }

    # ---------------------------------------------------------
    # BƯỚC 3 — Normalize level thành chữ HOA
    # "error" → "ERROR", "info" → "INFO"
    # ---------------------------------------------------------
    mutate {
      uppercase => ["level"]
    }

    # ---------------------------------------------------------
    # BƯỚC 4 — Parse timestamp thành @timestamp chuẩn ES
    # ---------------------------------------------------------
    date {
      match   => ["log_timestamp", "ISO8601"]
      target  => "@timestamp"
      timezone => "UTC"
    }

    mutate {
      remove_field => ["log_timestamp"]
    }

    # ---------------------------------------------------------
    # BƯỚC 5 — Grok enrich: tách error_code từ message
    # VD: "PAYMENT_FAILED: gateway timeout" → error_code=PAYMENT_FAILED
    # Không bắt buộc — tag_on_failure=[] để bỏ qua silently
    # ---------------------------------------------------------
    grok {
      match => {
        "log_message" => "^(?:%{WORD:error_code}:\s*)?%{GREEDYDATA:error_detail}"
      }
      tag_on_failure => []
    }

    # ---------------------------------------------------------
    # BƯỚC 6 — Thêm metadata môi trường
    # ---------------------------------------------------------
    mutate {
      add_field => {
        "environment" => "development"
        "stack"       => "log-system"
      }
    }

  }

}

output {

  # -----------------------------------------------------------
  # Output chính — Elasticsearch
  # Index theo ngày: logs-2024.01.15
  # -----------------------------------------------------------
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    user     => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index    => "logs-%{+YYYY.MM.dd}"

    # Template đảm bảo mapping đúng cho các field
    manage_template  => true
    template_name    => "logs"
    template_overwrite => true
  }

  # -----------------------------------------------------------
  # Output debug — bật khi cần troubleshoot
  # Uncomment dòng dưới để xem log ra stdout của Logstash
  # -----------------------------------------------------------
  # stdout {
  #   codec => rubydebug
  # }

}
